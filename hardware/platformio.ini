; =============================================================================
;  CAN-7USAT V3.0 – PlatformIO Project Configuration
;  Bennett University – Astronomy Club / Space Tech Division
;  IN-SPACe CAN-7USAT India Student Competition 2026
; =============================================================================

[env:cansat_flight]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor (bench debug – disable on flight hardware to free UART0 for XBee)
monitor_speed = 9600

; Upload settings
upload_speed  = 921600

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=0

; Library dependencies
lib_deps =
    adafruit/Adafruit BMP3XX Library @ ^2.1.2
    adafruit/Adafruit BNO055 @ ^1.6.3
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    sensirion/Sensirion I2C SPS30 @ ^0.2.0
    sensirion/Sensirion I2C SCD4x @ ^0.4.0
    mikalhart/TinyGPSPlus @ ^1.0.3
    ; ArduCAM (optional – for OV2640 camera):
    ; arducam/ArduCAM @ ^1.0.0

; Source filter – compile all .cpp files in src/
src_filter = +<*> -<.git/> -<.svn/>

; =============================================================================
;  Bench/debug environment (verbose logging, slower baud)
; =============================================================================
[env:cansat_bench]
extends       = env:cansat_flight
build_flags   =
    -DCORE_DEBUG_LEVEL=4
    -DBENCH_MODE=1
monitor_speed = 115200
upload_speed  = 460800
